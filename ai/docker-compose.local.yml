version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: modulr-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  ai-router:
    image: python:3.11-slim
    container_name: modulr-ai-router
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir fastapi uvicorn &&
             uvicorn main:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"
    volumes:
      - ./local_router:/app
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

volumes:
  ollama-data:
