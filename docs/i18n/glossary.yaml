## Usage Guidelines

### In Documentation
- Use terms in **bold** on first mention
- Use `code` format for subsequent mentions
- Reference this glossary for complex terms

### In Code
- Keep technical terms in English in code comments
- Add translations in comment blocks when helpful

```go
// RU: EventBus handles inter-module communication
// EN: EventBus handles inter-module communication  
// ZH: EventBus handles inter-module communication
type EventBus interface {
    Publish(event Event) error
}
```

### Translation Rules
1. **Do not translate** technical terms that are universal (EventBus, API, JSON)
2. **Translate** concepts that have language-specific equivalents
3. **Be consistent** with terminology across all documentation
4. **Update glossary** when adding new technical terms
